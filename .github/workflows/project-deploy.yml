name: Project Deploy

on:
  workflow_call:
    inputs:
      vite_site_url:
        description: "Public site URL injected into the Vite build"
        required: true
        type: string
      vite_krakstack_auth_url:
        description: "Public KrakStack auth URL injected into the Vite build"
        required: false
        type: string
        default: ""
      vite_krakstack_auth_project_id:
        description: "Public KrakStack auth project ID injected into the Vite build"
        required: false
        type: string
        default: ""
      vite_analytics_website_id:
        description: "Public analytics website ID injected into the Vite build"
        required: false
        type: string
        default: ""
      image_sha:
        description: "Existing image SHA to deploy"
        required: false
        type: string
      build_image:
        description: "Build and push the image before releasing"
        required: false
        type: boolean
        default: true
      build_context:
        description: "Docker build context"
        required: false
        type: string
        default: "."
      dockerfile:
        description: "Dockerfile path"
        required: false
        type: string
        default: Dockerfile
      image_suffix:
        description: "Suffix appended to ghcr.io/owner/repo, for example /auth"
        required: false
        type: string
        default: ""
      project_slug:
        description: "Krak project slug"
        required: true
        type: string
      krak_group:
        description: "Krak project task group name"
        required: false
        type: string
        default: app
      krak_task:
        description: "Krak project task name"
        required: false
        type: string
        default: web
      environment:
        description: "GitHub environment used for the release job"
        required: false
        type: string
        default: production
    secrets:
      KRAK_ADMIN_URL:
        required: true
      KRAK_RELEASE_TOKEN:
        required: true
      TS_OAUTH_CLIENT_ID:
        required: true
      TS_OAUTH_SECRET:
        required: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    if: inputs.build_image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.build_context }}
          file: ${{ inputs.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_NAME }}${{ inputs.image_suffix }}:latest
            ghcr.io/${{ env.IMAGE_NAME }}${{ inputs.image_suffix }}:${{ github.sha }}
          build-args: |
            VITE_SITE_URL=${{ inputs.vite_site_url }}
            VITE_KRAKSTACK_AUTH_URL=${{ inputs.vite_krakstack_auth_url }}
            VITE_KRAKSTACK_AUTH_PROJECT_ID=${{ inputs.vite_krakstack_auth_project_id }}
            VITE_ANALYTICS_WEBSITE_ID=${{ inputs.vite_analytics_website_id }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    runs-on: ubuntu-latest
    needs: [build]
    if: always() && (!inputs.build_image || needs.build.result == 'success')
    environment: ${{ inputs.environment }}
    concurrency: deploy-${{ inputs.project_slug }}
    permissions:
      contents: read
      id-token: write

    env:
      RELEASE_SHA: ${{ inputs.image_sha || github.sha }}

    steps:
      - name: Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Release
        run: |
          curl -fsS \
            -H "Authorization: Bearer $KRAK_RELEASE_TOKEN" \
            -H "Content-Type: application/json" \
            -X POST \
            "$KRAK_ADMIN_URL/api/projects/$KRAK_PROJECT_SLUG/releases?group=$KRAK_GROUP&task=$KRAK_TASK" \
            -d "{\"image\":\"docker://ghcr.io/${IMAGE_NAME}${IMAGE_SUFFIX}:${RELEASE_SHA}\",\"gitSha\":\"${RELEASE_SHA}\"}"
        env:
          KRAK_ADMIN_URL: ${{ secrets.KRAK_ADMIN_URL }}
          KRAK_RELEASE_TOKEN: ${{ secrets.KRAK_RELEASE_TOKEN }}
          KRAK_PROJECT_SLUG: ${{ inputs.project_slug }}
          KRAK_GROUP: ${{ inputs.krak_group }}
          KRAK_TASK: ${{ inputs.krak_task }}
          IMAGE_SUFFIX: ${{ inputs.image_suffix }}
